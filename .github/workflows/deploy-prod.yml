name: Deploy PROD

on:
  push:
    branches: [main]

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run type-check

  migrate:
    name: Apply Supabase Migrations to PROD
    runs-on: ubuntu-latest
    needs: typecheck
    environment: Production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Supabase CLI
        run: npm install -g supabase@latest

      - name: Link to PROD Supabase
        run: supabase link --project-ref ${{ secrets.PROD_SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Check pending migrations
        id: check_migrations
        run: |
          OUTPUT=$(supabase db push --dry-run 2>&1) || true
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -q "Would apply"; then
            echo "has_pending=true" >> $GITHUB_OUTPUT
            echo "::notice::Pending migrations detected — will apply to PROD"
          else
            echo "has_pending=false" >> $GITHUB_OUTPUT
            echo "::notice::No pending migrations"
          fi
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Apply migrations to PROD
        if: steps.check_migrations.outputs.has_pending == 'true'
        run: supabase db push --yes
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Verify migration status
        run: supabase migration list
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  deploy:
    name: Build & Deploy to PROD
    runs-on: ubuntu-latest
    needs: [typecheck, migrate]
    environment: Production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create .env.production from secrets
        run: |
          cat > .env.production << EOF
          VITE_SUPABASE_URL=${{ secrets.PROD_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY=${{ secrets.PROD_SUPABASE_ANON_KEY }}
          VITE_APP_URL=https://gestabiz.com
          VITE_SITE_URL=https://gestabiz.com
          VITE_APP_NAME=Gestabiz
          VITE_DEMO_MODE=false
          VITE_PAYMENT_GATEWAY=${{ secrets.PROD_PAYMENT_GATEWAY }}
          VITE_MERCADOPAGO_PUBLIC_KEY=${{ secrets.PROD_MERCADOPAGO_PUBLIC_KEY }}
          VITE_SUPPORT_EMAIL=soporte@gestabiz.com
          VITE_SENTRY_DSN=${{ secrets.SENTRY_DSN }}
          VITE_APP_VERSION=${{ github.ref_name }}
          VITE_SENTRY_SAMPLE_RATE=0.3
          VITE_GA_MEASUREMENT_ID=${{ secrets.PROD_GA_MEASUREMENT_ID }}
          EOF

      - name: Build for production
        run: npm run build
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Deploy to Vercel (PROD)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          scope: ${{ secrets.VERCEL_ORG_ID }}
          working-directory: ./
