name: Deploy PROD

on:
  push:
    branches: [main]

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run type-check

  migrate:
    name: Apply Supabase Migrations to PROD
    runs-on: ubuntu-latest
    needs: typecheck
    environment: Production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Supabase CLI
        run: npm install -g supabase@latest

      - name: Link to PROD Supabase
        run: supabase link --project-ref ${{ secrets.PROD_SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Check pending migrations
        id: check_migrations
        run: |
          OUTPUT=$(supabase db push --dry-run --dns-resolver https 2>&1) || true
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -q "Would apply"; then
            echo "has_pending=true" >> $GITHUB_OUTPUT
            echo "::notice::Pending migrations detected — will apply to PROD"
          else
            echo "has_pending=false" >> $GITHUB_OUTPUT
            echo "::notice::No pending migrations"
          fi
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Apply migrations to PROD
        if: steps.check_migrations.outputs.has_pending == 'true'
        run: supabase db push --dns-resolver https --yes
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Verify migration status
        run: supabase migration list --dns-resolver https
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  deploy-edge-functions:
    name: Deploy Changed Edge Functions to PROD
    runs-on: ubuntu-latest
    needs: [typecheck, migrate]
    environment: Production

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Supabase CLI
        run: npm install -g supabase@latest

      - name: Detect changed edge functions
        id: changed_functions
        run: |
          set -euo pipefail

          BEFORE_SHA="${{ github.event.before }}"
          if [ -n "$BEFORE_SHA" ] && [ "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]; then
            CHANGED_FILES="$(git diff --name-only "$BEFORE_SHA" ${{ github.sha }})"
          else
            CHANGED_FILES="$(git show --name-only --pretty='' ${{ github.sha }})"
          fi

          if echo "$CHANGED_FILES" | grep -q '^supabase/functions/_shared/'; then
            echo "Shared folder changed. Deploying all edge functions."
            FUNCTIONS=$(find supabase/functions -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | grep -v '^_shared$' | sort)
          else
            FUNCTIONS=$(echo "$CHANGED_FILES" \
              | grep '^supabase/functions/' \
              | cut -d'/' -f3 \
              | grep -v '^_shared$' \
              | sort -u || true)
          fi

          if [ -z "$FUNCTIONS" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No edge function changes detected."
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            {
              echo "functions<<EOF"
              echo "$FUNCTIONS"
              echo "EOF"
            } >> $GITHUB_OUTPUT
            echo "Functions to deploy:"
            echo "$FUNCTIONS"
          fi

      - name: Deploy changed functions to PROD
        if: steps.changed_functions.outputs.has_changes == 'true'
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail

          while IFS= read -r fn; do
            [ -z "$fn" ] && continue
            echo "Deploying function: $fn"
            supabase functions deploy "$fn" --project-ref ${{ secrets.PROD_SUPABASE_PROJECT_REF }}
          done << 'EOF'
          ${{ steps.changed_functions.outputs.functions }}
          EOF

  deploy:
    name: Build & Deploy to PROD
    runs-on: ubuntu-latest
    needs: [typecheck, migrate, deploy-edge-functions]
    environment: Production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create .env.production from secrets
        run: |
          cat > .env.production << EOF
          VITE_SUPABASE_URL=${{ secrets.PROD_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY=${{ secrets.PROD_SUPABASE_ANON_KEY }}
          VITE_APP_URL=https://gestabiz.com
          VITE_SITE_URL=https://gestabiz.com
          VITE_APP_NAME=Gestabiz
          VITE_DEMO_MODE=false
          VITE_PAYMENT_GATEWAY=${{ secrets.PROD_PAYMENT_GATEWAY }}
          VITE_MERCADOPAGO_PUBLIC_KEY=${{ secrets.PROD_MERCADOPAGO_PUBLIC_KEY }}
          VITE_SUPPORT_EMAIL=soporte@gestabiz.com
          VITE_SENTRY_DSN=${{ secrets.SENTRY_DSN }}
          VITE_APP_VERSION=${{ github.ref_name }}
          VITE_SENTRY_SAMPLE_RATE=0.3
          VITE_GA_MEASUREMENT_ID=${{ secrets.PROD_GA_MEASUREMENT_ID }}
          EOF

      - name: Build for production
        run: npm run build
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Deploy to Vercel (PROD)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
          scope: ${{ secrets.VERCEL_ORG_ID }}
          working-directory: ./
