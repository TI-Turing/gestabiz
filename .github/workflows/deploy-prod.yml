name: Deploy PROD

on:
  push:
    branches: [main]

concurrency:
  group: production
  cancel-in-progress: true

jobs:

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci
      - run: npm run type-check


  migrate:
    name: Apply Supabase Migrations to PROD
    runs-on: ubuntu-latest
    needs: typecheck
    environment: Production

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate Supabase credentials
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            echo "Missing SUPABASE_ACCESS_TOKEN in repository secrets"
            exit 1
          fi

      - name: Link to PROD Supabase
        run: |
          npx supabase link \
            --project-ref ${{ vars.PROD_SUPABASE_PROJECT_REF }}

      - name: Check pending migrations
        id: check_migrations
        run: |
          OUTPUT=$(npx supabase db push --dry-run --dns-resolver https 2>&1) || true
          echo "$OUTPUT"

          if echo "$OUTPUT" | grep -q "Would apply"; then
            echo "has_pending=true" >> $GITHUB_OUTPUT
            echo "::notice::Pending migrations detected"
          else
            echo "has_pending=false" >> $GITHUB_OUTPUT
            echo "::notice::No pending migrations"
          fi

      - name: Apply migrations
        if: steps.check_migrations.outputs.has_pending == 'true'
        run: npx supabase db push --dns-resolver https --yes

      - name: Verify migration status
        run: npx supabase migration list --dns-resolver https


  deploy-edge-functions:
    name: Deploy All Edge Functions to PROD
    runs-on: ubuntu-latest
    needs: [typecheck, migrate]
    environment: Production

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Deploy all edge functions
        run: |
          npx supabase functions deploy \
            --project-ref ${{ vars.PROD_SUPABASE_PROJECT_REF }} \
            --dns-resolver https