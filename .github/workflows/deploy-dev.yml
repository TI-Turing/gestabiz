name: Deploy DEV

on:
  push:
    branches: [dev]
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy to DEV
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install pnpm
        run: npm install -g pnpm@10

      - name: Install dependencies
        run: npm ci

      - name: Deploy to Vercel (DEV)
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          npx vercel@latest pull --yes --environment=preview \
            --token=${{ secrets.VERCEL_TOKEN }}
          npx vercel@latest build \
            --token=${{ secrets.VERCEL_TOKEN }}
          DEPLOY_URL=$(npx vercel@latest deploy --prebuilt \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --scope=${{ secrets.VERCEL_ORG_ID }})
          echo "Deployed to: $DEPLOY_URL"
          npx vercel@latest alias set "$DEPLOY_URL" dev.gestabiz.com \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --scope=${{ secrets.VERCEL_ORG_ID }}

  migrate:
    name: Apply Supabase Migrations to DEV
    runs-on: ubuntu-latest
    needs: deploy
    environment: dev

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Link to DEV Supabase
        run: |
          npx supabase link \
            --project-ref ${{ vars.SUPABASE_PROJECT_REF }}

      - name: Apply migrations
        run: |
          npx supabase db push --dns-resolver https --yes

      - name: Verify migration status
        run: |
          npx supabase migration list --dns-resolver https

  deploy-edge-functions:
    name: Deploy All Edge Functions to DEV
    runs-on: ubuntu-latest
    needs: deploy
    environment: dev

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Deploy all edge functions
        run: |
          npx supabase functions deploy \
            --project-ref ${{ vars.SUPABASE_PROJECT_REF }} \
            --dns-resolver https
