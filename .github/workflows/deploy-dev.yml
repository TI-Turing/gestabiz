name: Deploy DEV

on:
  push:
    branches: [dev]
  workflow_dispatch:

jobs:
  supabase-sync:
    name: Supabase Sync DEV (Migrations + Functions)
    runs-on: ubuntu-latest
    environment: dev
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.DEV_SUPABASE_ACCESS_TOKEN || secrets.SUPABASE_ACCESS_TOKEN }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Resolve DEV project ref
        id: dev_ref
        run: |
          REF="${{ secrets.DEV_SUPABASE_PROJECT_REF }}"
          if [ -z "$REF" ]; then
            REF="dkancockzvcqorqbwtyh"
          fi
          echo "project_ref=$REF" >> $GITHUB_OUTPUT

      - name: Validate Supabase credentials (DEV)
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            echo "Missing SUPABASE_ACCESS_TOKEN. Configure DEV_SUPABASE_ACCESS_TOKEN (preferred) or SUPABASE_ACCESS_TOKEN in GitHub Secrets."
            exit 1
          fi

      - name: Link to DEV Supabase
        run: npx supabase link --project-ref ${{ steps.dev_ref.outputs.project_ref }}

      - name: Check pending migrations (DEV)
        id: check_migrations
        run: |
          OUTPUT=$(npx supabase db push --dry-run --dns-resolver https 2>&1) || true
          echo "$OUTPUT"
          if echo "$OUTPUT" | grep -q "Would apply"; then
            echo "has_pending=true" >> $GITHUB_OUTPUT
            echo "::notice::Pending migrations detected — will apply to DEV"
          else
            echo "has_pending=false" >> $GITHUB_OUTPUT
            echo "::notice::No pending migrations"
          fi

      - name: Apply migrations to DEV
        if: steps.check_migrations.outputs.has_pending == 'true'
        run: npx supabase db push --dns-resolver https --yes

      - name: Verify migration status (DEV)
        run: npx supabase migration list --dns-resolver https

      - name: Detect changed edge functions
        id: changed_functions
        run: |
          set -euo pipefail

          BEFORE_SHA="${{ github.event.before }}"
          if [ -n "$BEFORE_SHA" ] && [ "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]; then
            CHANGED_FILES="$(git diff --name-only "$BEFORE_SHA" ${{ github.sha }})"
          else
            CHANGED_FILES="$(git show --name-only --pretty='' ${{ github.sha }})"
          fi

          if echo "$CHANGED_FILES" | grep -q '^supabase/functions/_shared/'; then
            echo "Shared folder changed. Deploying all edge functions."
            FUNCTIONS=$(find supabase/functions -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | grep -v '^_shared$' | sort)
          else
            FUNCTIONS=$(echo "$CHANGED_FILES" \
              | grep '^supabase/functions/' \
              | cut -d'/' -f3 \
              | grep -v '^_shared$' \
              | sort -u || true)
          fi

          if [ -z "$FUNCTIONS" ]; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No edge function changes detected."
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            {
              echo "functions<<EOF"
              echo "$FUNCTIONS"
              echo "EOF"
            } >> $GITHUB_OUTPUT
            echo "Functions to deploy:"
            echo "$FUNCTIONS"
          fi

      - name: Deploy changed functions to DEV
        if: steps.changed_functions.outputs.has_changes == 'true'
        run: |
          set -euo pipefail

          while IFS= read -r fn; do
            [ -z "$fn" ] && continue
            echo "Deploying function: $fn"
            npx supabase functions deploy "$fn" --project-ref ${{ steps.dev_ref.outputs.project_ref }}
          done << 'EOF'
          ${{ steps.changed_functions.outputs.functions }}
          EOF

  deploy:
    name: Build & Deploy to DEV
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    environment: dev
    needs: [supabase-sync]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create .env.staging from secrets
        run: |
          cat > .env.staging << EOF
          VITE_SUPABASE_URL=${{ secrets.DEV_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY=${{ secrets.DEV_SUPABASE_ANON_KEY }}
          VITE_APP_URL=${{ secrets.DEV_APP_URL }}
          VITE_SITE_URL=${{ secrets.DEV_APP_URL }}
          VITE_APP_NAME=Gestabiz [DEV]
          VITE_DEMO_MODE=false
          VITE_PAYMENT_GATEWAY=${{ secrets.DEV_PAYMENT_GATEWAY }}
          VITE_MERCADOPAGO_PUBLIC_KEY=${{ secrets.DEV_MERCADOPAGO_PUBLIC_KEY }}
          VITE_SUPPORT_EMAIL=dev@gestabiz.com
          VITE_SENTRY_DSN=${{ secrets.SENTRY_DSN }}
          VITE_APP_VERSION=${{ github.sha }}
          VITE_SENTRY_SAMPLE_RATE=1.0
          VITE_GA_MEASUREMENT_ID=${{ secrets.DEV_GA_MEASUREMENT_ID }}
          EOF

      - name: Build for staging
        run: npm run build:dev
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Deploy to Vercel (DEV)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          scope: ${{ secrets.VERCEL_ORG_ID }}
          alias-domains: dev.gestabiz.com
          working-directory: ./
