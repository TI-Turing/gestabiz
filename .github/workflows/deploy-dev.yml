name: Deploy DEV

on:
  push:
    branches: [dev]
  workflow_dispatch:

jobs:
  test:
    name: Run Tests & Coverage Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Run Tests with Coverage
        run: npm run test -- --coverage

  migrate:
    name: Apply Supabase Migrations to DEV
    needs: test
    runs-on: ubuntu-latest
    environment: dev

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Link to DEV Supabase
        run: |
          npx supabase link \
            --project-ref ${{ vars.SUPABASE_PROJECT_REF }}

      - name: Apply migrations
        run: |
          npx supabase db push --include-all --dns-resolver https --yes

      - name: Verify migration status
        run: |
          npx supabase migration list --dns-resolver https

  deploy-edge-functions:
    name: Deploy All Edge Functions to DEV
    needs: migrate
    runs-on: ubuntu-latest
    environment: dev

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Deploy all edge functions
        run: |
          npx supabase functions deploy \
            --project-ref ${{ vars.SUPABASE_PROJECT_REF }} \
            --dns-resolver https
