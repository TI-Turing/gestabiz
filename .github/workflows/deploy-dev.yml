name: Deploy DEV

on:
  push:
    branches: [dev]
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy to DEV
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create .env.staging from secrets
        run: |
          cat > .env.staging << EOF
          VITE_SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
          VITE_APP_URL=${{ secrets.APP_URL }}
          VITE_APP_NAME=Gestabiz [DEV]
          VITE_DEMO_MODE=false
          VITE_PAYMENT_GATEWAY=${{ secrets.PAYMENT_GATEWAY }}
          VITE_MERCADOPAGO_PUBLIC_KEY=${{ secrets.MERCADOPAGO_PUBLIC_KEY }}
          VITE_SENTRY_DSN=${{ secrets.SENTRY_DSN }}
          VITE_SENTRY_SAMPLE_RATE=1.0
          VITE_GA_MEASUREMENT_ID=${{ secrets.GA_MEASUREMENT_ID }}
          EOF

      - name: Build for staging
        run: npm run build:dev
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Deploy to Vercel (DEV)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          scope: ${{ secrets.VERCEL_ORG_ID }}
          alias-domains: dev.gestabiz.com
          working-directory: ./

  migrate:
    name: Apply Supabase Migrations to DEV
    runs-on: ubuntu-latest
    needs: deploy
    environment: dev

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Link to DEV Supabase
        run: |
          npx supabase link \
            --project-ref ${{ vars.SUPABASE_PROJECT_REF }}

      - name: Apply migrations
        run: |
          npx supabase db push --dns-resolver https --yes

      - name: Verify migration status
        run: |
          npx supabase migration list --dns-resolver https

  deploy-edge-functions:
    name: Deploy All Edge Functions to DEV
    runs-on: ubuntu-latest
    needs: deploy
    environment: dev

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Deploy all edge functions
        run: |
          npx supabase functions deploy \
            --project-ref ${{ vars.SUPABASE_PROJECT_REF }} \
            --dns-resolver https
