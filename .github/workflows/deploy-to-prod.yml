name: Deploy Functions to Production

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/functions/send-email-reminder/**'
      - 'supabase/functions/send-whatsapp-reminder/**'
      - 'supabase/functions/send-sms-reminder/**'
      - 'package.json'

jobs:
  deploy-functions:
    name: Deploy Edge Functions to Production
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Deploy send-email-reminder to Production
        run: npx supabase functions deploy send-email-reminder --project-ref ${{ secrets.SUPABASE_PROD_PROJECT_ID }} --dns-resolver https
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      
      - name: Deploy send-whatsapp-reminder to Production
        run: npx supabase functions deploy send-whatsapp-reminder --project-ref ${{ secrets.SUPABASE_PROD_PROJECT_ID }} --dns-resolver https
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      
      - name: Deploy send-sms-reminder to Production
        run: npx supabase functions deploy send-sms-reminder --project-ref ${{ secrets.SUPABASE_PROD_PROJECT_ID }} --dns-resolver https
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      
      - name: Verify deployments
        run: npx supabase functions list --project-ref ${{ secrets.SUPABASE_PROD_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      
      - name: Deployment Success
        if: success()
        run: echo "✅ All functions deployed successfully to Production"
      
      - name: Deployment Failed
        if: failure()
        run: echo "❌ Deployment to Production failed. Check logs above." && exit 1
