sonar.projectKey=TI-Turing_gestabiz
sonar.organization=ti-turing

sonar.projectName=Gestabiz
sonar.projectVersion=1.0.3

# Fuentes principales (excluye mobile, extension y tests)
sonar.sources=src
sonar.exclusions=\
  src/mobile/**,\
  src/browser-extension/**,\
  src/**/*.test.ts,\
  src/**/*.test.tsx,\
  src/**/*.spec.ts,\
  src/**/*.spec.tsx,\
  src/**/__tests__/**,\
  src/**/demoData.ts,\
  node_modules/**,\
  dist/**,\
  coverage/**,\
  extension/**,\
  public/**,\
  scripts/**,\
  supabase/functions/**

# Tests
sonar.tests=src
sonar.test.inclusions=\
  src/**/*.test.ts,\
  src/**/*.test.tsx,\
  src/**/*.spec.ts,\
  src/**/*.spec.tsx

# Cobertura de código
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# TypeScript
sonar.typescript.tsconfigPath=tsconfig.json

# Encoding
sonar.sourceEncoding=UTF-8
