    <!-- 4. FAQPage — Preguntas frecuentes para rich results en Google -->
    <script type="application/ld+json" data-schema="faq">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "¿Qué es Gestabiz?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Gestabiz es un software todo-en-uno de gestión de citas y agenda online para pequeñas y medianas empresas (PyMEs) en Colombia y LATAM. Incluye agenda online, recordatorios automáticos por WhatsApp y Email, CRM de clientes, sistema contable para Colombia y gestión de empleados."
          }
        },
        {
          "@type": "Question",
          "name": "¿Para qué tipos de negocio sirve Gestabiz?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Gestabiz es ideal para salones de belleza, peluquerías, barberías, clínicas médicas y dentales, consultorios psicológicos, centros de fisioterapia, gimnasios, centros de estética, spas, entrenadores personales, centros deportivos, coworkings, y cualquier negocio que gestione citas, turnos o reservas en Colombia."
          }
        },
        {
          "@type": "Question",
          "name": "¿Cuánto cuesta Gestabiz?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Gestabiz tiene un plan gratuito para siempre con funciones básicas. El plan Inicio cuesta $80.000 COP por mes e incluye recordatorios automáticos, CRM, contabilidad y más. Todos los planes incluyen 30 días de prueba gratuita sin tarjeta de crédito."
          }
        },
        {
          "@type": "Question",
          "name": "¿Gestabiz funciona en Colombia?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sí. Gestabiz está diseñado específicamente para Colombia. Incluye soporte para pesos colombianos (COP), facturación compatible con DIAN, IVA, ICA, Retención en la Fuente, festivos colombianos y pagos con PayU y MercadoPago."
          }
        },
        {
          "@type": "Question",
          "name": "¿Cómo reduce Gestabiz las citas perdidas o no-shows?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Gestabiz envía recordatorios automáticos por WhatsApp, Email y SMS antes de cada cita. Nuestros clientes reportan una reducción del 70% en ausencias (no-shows), lo que representa un ahorro de hasta $1.5 millones de pesos mensuales en citas perdidas."
          }
        },
        {
          "@type": "Question",
          "name": "¿Gestabiz tiene app móvil?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sí, Gestabiz tiene aplicación móvil nativa para iOS y Android. Puedes gestionar tu agenda, ver citas del día, atender clientes y revisar reportes de ingresos desde cualquier lugar."
          }
        },
        {
          "@type": "Question",
          "name": "¿Se puede gestionar múltiples sedes con Gestabiz?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sí. Gestabiz permite gestionar múltiples sedes o sucursales desde un solo panel de control. Cada sede tiene su propia configuración de horarios, empleados y servicios disponibles."
          }
        },
        {
          "@type": "Question",
          "name": "¿En qué se diferencia Gestabiz de Calendly o Setmore?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "A diferencia de Calendly o Setmore, Gestabiz incluye contabilidad integrada compatible con DIAN, gestión de empleados, portal de reclutamiento, chat en tiempo real, y soporte completo para Colombia (pesos COP, PayU, festivos colombianos). Todo en una sola plataforma, sin pagar por múltiples herramientas separadas."
          }
        },
        {
          "@type": "Question",
          "name": "¿Los clientes pueden reservar citas sin descargar ninguna app?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sí. Cada negocio en Gestabiz tiene un perfil público accesible desde cualquier navegador web. Los clientes pueden ver los servicios, empleados y disponibilidad, y reservar citas directamente sin necesidad de descargar ninguna aplicación."
          }
        }
      ]
